<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng Ký - Comic_Web</title>
    <link rel="stylesheet" href="css/register.css" />
    <link rel="shortcut icon" href="img/logo.png" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css"
    />
  </head>

  <body>
    <div class="register-container">
      <div class="register-card">
        <!-- Nút đóng (X) quay về trang chủ -->
        <a href="trangchu.html" class="close-btn" title="Quay về trang chủ">
          <i class="bi bi-x-lg"></i>
        </a>

        <div class="register-header">
          <img src="img/logo.png" alt="Comic_Web Logo" class="logo-register" />
          <h2>Đăng ký</h2>
          <p>Tạo tài khoản mới để trải nghiệm đầy đủ tính năng</p>
        </div>

        <form id="registerForm" novalidate>
          <!-- Tên người dùng -->
          <div class="form-row" id="row-username">
            <label>
              <i class="bi bi-person"></i> Tên người dùng
              <input
                type="text"
                id="username"
                placeholder="Nguyễn Văn A"
                autocomplete="username"
              />
            </label>
            <small class="notification" id="usernameMsg"></small>
          </div>

          <!-- Email -->
          <div class="form-row" id="row-email">
            <label>
              <i class="bi bi-envelope"></i> Email
              <input
                type="email"
                id="email"
                placeholder="example@email.com"
                autocomplete="email"
              />
            </label>
            <small class="notification" id="emailMsg"></small>
          </div>

          <!-- Mật khẩu -->
          <div class="form-row" id="row-password">
            <label>
              <i class="bi bi-lock"></i> Mật khẩu
              <div class="password-wrapper">
                <input
                  type="password"
                  id="password"
                  placeholder="Tối thiểu 8 ký tự"
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  id="togglePassword"
                  aria-label="Hiển thị mật khẩu"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </label>
            <small class="notification" id="passwordMsg"></small>
          </div>

          <!-- Xác nhận mật khẩu -->
          <div class="form-row" id="row-confirm">
            <label>
              <i class="bi bi-check-circle"></i> Xác nhận mật khẩu
              <div class="password-wrapper">
                <input
                  type="password"
                  id="confirm-password"
                  placeholder="Nhập lại mật khẩu"
                  autocomplete="new-password"
                />
                <button
                  type="button"
                  class="toggle-password"
                  id="toggleConfirmPassword"
                  aria-label="Hiển thị mật khẩu"
                >
                  <i class="bi bi-eye"></i>
                </button>
              </div>
            </label>
            <small class="notification" id="confirmMsg"></small>
          </div>

          <div class="form-agreement">
            <label class="agree-check">
              <input type="checkbox" id="agree" />
              <span>
                Tôi đồng ý với
                <a href="dieukhoan.html">Điều khoản sử dụng</a>
                và
                <a href="chinhsach.html">Chính sách bảo mật</a>
              </span>
            </label>
          </div>

          <button type="submit" class="btn-register">Đăng ký</button>
        </form>

        <div class="login-link">
          Đã có tài khoản? <a href="login.html">Đăng nhập ngay</a>
        </div>
      </div>
    </div>

    <script src="js/register.js"></script>
  </body>
</html>
